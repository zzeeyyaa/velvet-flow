openapi: 3.0.0
info:
  title: "🚀 VelvetFlow API — Concurrency & Flash-Sale Simulator"
  description: >
    API Blueprint untuk simulator high-concurrency ticket war. 
    Desain ini dioptimalkan untuk memproses 500+ request/detik secara aman 
    menggunakan kombinasi Redis Distributed Lock (SETNX) dan Postgres Atomic Transactions.
  version: 1.2.0

paths:
  # ==========================================
  # FLOW 1 & 3: EVENT MANAGEMENTS
  # ==========================================
  /api/events:
    post:
      summary: "Admin Event Provisioning (Create)"
      description: >
        **Flow Logis:** Membuat data induk acara baru. Tabel ini sengaja dibuat bersih 
        dari kolom stok dinamis agar database Postgres tidak mengalami bottleneck 
        akibat tingginya read-request dari landing page saat 'war' dimulai.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, sale_starts_at]
              properties:
                name:
                  type: string
                  example: "Konser Coldplay Jakarta"
                status:
                  type: string
                  enum: [UPCOMING, ONGOING]
                  default: "UPCOMING"
                sale_starts_at:
                  type: string
                  format: date-time
      responses:
        '201':
          description: "Event successfully created"
        '400':
          $ref: '#/components/responses/ValidationError'
        '500':
          $ref: '#/components/responses/ServerError'
          
    get:
      summary: "Fetch Landing Page Info (Read)"
      description: "Membaca semua event aktif untuk didistribusikan ke Landing Page Next.js 16."
      responses:
        '200':
          description: "List of active events fetched successfully"
        '500':
          $ref: '#/components/responses/ServerError'

  /api/events/{id}:
    get:
      summary: "Fetch Event Details with Tickets (Read)"
      description: "Mengambil detail dari satu event beserta daftar tiket yang tersedia untuk event tersebut. Dibutuhkan halaman detail sebelum simulasi dijalankan."
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: "Event details with its tickets list fetched successfully"
          content:
            application/json:
              schema:
                type: object
                properties:
                  id: { type: string, format: uuid }
                  name: { type: string, example: "Konser Coldplay Jakarta" }
                  status: { type: string, example: "UPCOMING" }
                  sale_starts_at: { type: string, format: date-time }
                  created_at: { type: string, format: date-time }
                  tickets:
                    type: array
                    items:
                      $ref: '#/components/schemas/Ticket'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/ServerError'

    patch:
      summary: "Update Event Status (Update)"
      description: "Mengubah status event dari UPCOMING menjadi ONGOING atau ENDED untuk mengontrol alur penjualan tiket."
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [status]
              properties:
                status:
                  type: string
                  enum: [UPCOMING, ONGOING, ENDED]
                  example: "ONGOING"
      responses:
        '200':
          description: "Event status successfully updated"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Event'
        '400':
          $ref: '#/components/responses/ValidationError'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/ServerError'

  # ==========================================
  # FLOW 2: THE CONCURRENCY CORE (TICKET WAR)
  # ==========================================
  /api/v1/tickets/book:
    post:
      summary: "The Concurrency Core — War Ticket Endpoint (Create Order)"
      description: >
        **CRITICAL HIGH-CONCURRENCY PLOT MAP:**
        
        1. **Interceptor Layer:** Hono Backend menerima payload dan langsung mengecek `idempotency_key` untuk mencegah double-booking.
        
        2. **Memory Layer (Redis Lock):** Backend menembak instruksi `SET lock:ticket:<id> <user_id> NX PX 2000` ke Redis.
        
        3. **Atomic Verification:** Jika lock sukses, kurangi stok di Redis. Jika stok tersedia, buka Postgres Transaction (`BEGIN`), kurangi kuota fisik di tabel `tickets`, lalu masukkan baris transaksi baru ke tabel `orders` dengan status `PENDING_PAYMENT`.
        
        4. **Fallback Handling:** Jika lock gagal didapatkan dalam milidetik tersebut, sistem langsung memantulkan request dengan status HTTP 409 (Conflict).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [ticket_id, simulated_user_id, idempotency_key]
              properties:
                ticket_id:
                  type: string
                  format: uuid
                simulated_user_id:
                  type: string
                  format: uuid
                  description: "ID virtual user (bot) acak yang disuntikkan secara instan oleh k6"
                idempotency_key:
                  type: string
                  example: "idmp-vlv-99281"
      responses:
        '201':
          description: "Ticket Locked successfully! Virtual Account issued."
          content:
            application/json:
              schema:
                type: object
                properties:
                  order_id:
                    type: string
                    format: uuid
                  dummy_va:
                    type: string
                    example: "BCA-12345"
                  status:
                    type: string
                    example: "PENDING_PAYMENT"
        '400':
          $ref: '#/components/responses/ValidationError'
        '409':
          $ref: '#/components/responses/Conflict'
        '500':
          $ref: '#/components/responses/ServerError'

  # ==========================================
  # FLOW 4: OBSERVABILITY & METRICS
  # ==========================================
  /api/metrics/live:
    get:
      summary: "Dashboard Observability Data Stream (Read)"
      description: >
        Endpoint yang dipolling oleh Next.js 16 secara real-time. Menghasilkan agregasi data 
        gabungan (`JOIN`) antara tabel orders dan tickets untuk memantau metrik performa: 
        RPS, throughput, lock_strategy yang sukses, dan total attempt_number dari client.
      responses:
        '200':
          description: "Live monitoring metrics stream fetched successfully"

  /api/orders:
    get:
      summary: "Fetch Orders list (Read)"
      description: "Mendapatkan daftar order dengan dukungan filter lock_strategy dan status, serta pagination. Dibutuhkan untuk dashboard hasil simulasi."
      parameters:
        - name: lock_strategy
          in: query
          required: false
          schema:
            type: string
            example: "REDIS_SETNX"
        - name: status
          in: query
          required: false
          schema:
            type: string
            example: "PENDING_PAYMENT"
        - name: page
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            default: 1
            example: 1
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 10
            example: 10
      responses:
        '200':
          description: "List of orders fetched successfully"
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Order'
                  pagination:
                    type: object
                    properties:
                      total: { type: integer, example: 150 }
                      page: { type: integer, example: 1 }
                      limit: { type: integer, example: 10 }
                      total_pages: { type: integer, example: 15 }
        '400':
          $ref: '#/components/responses/ValidationError'
        '500':
          $ref: '#/components/responses/ServerError'

  # ==========================================
  # FLOW 5: INDONESIA PAYMENT STACK & CLEANUP
  # ==========================================
  /api/orders/{id}/pay:
    patch:
      summary: "Simulate Local Payment Execution (Update)"
      description: >
        Mengubah status order di PostgreSQL dari `PENDING_PAYMENT` menjadi `PAID` secara permanen 
        saat pengguna mengklik tombol simulasi bayar di dashboard lokal.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: "Payment simulated successfully. Ticket officially issued."

  /api/simulation/reset:
    post:
      summary: "Purge Environment for Re-Testing (Delete/Reset)"
      description: >
        **Simulation Reset Flow:** Melakukan pengosongan (`TRUNCATE`) data massal pada tabel 
        `orders` dan `simulated_users`, serta mengembalikan nilai `stock` di tabel `tickets` 
        ke kuota awal (misal: 10) agar sistem siap dihantam ulang oleh load test k6 berikutnya.
      responses:
        '200':
          description: "Database environment successfully cleaned and reset"

# ==========================================
# DATABASE COMPONENT SCHEMAS
# ==========================================
components:
  schemas:
    Event:
      type: object
      properties:
        id: { type: string, format: uuid }
        name: { type: string, example: "Konser Coldplay Jakarta" }
        status: { type: string, example: "UPCOMING" }
        sale_starts_at: { type: string, format: date-time }
        created_at: { type: string, format: date-time }
        
    Ticket:
      type: object
      properties:
        id: { type: string, format: uuid }
        event_id: { type: string, format: uuid }
        category: { type: string, example: "VIP" }
        stock: { type: integer, example: 10 }
        status: { type: string, example: "AVAILABLE" }
        created_at: { type: string, format: date-time }

    Order:
      type: object
      properties:
        id: { type: string, format: uuid }
        ticket_id: { type: string, format: uuid }
        simulated_user_id: { type: string, format: uuid }
        dummy_va: { type: string, example: "BCA-12345" }
        idempotency_key: { type: string, example: "idmp-vlv-99281" }
        status: { type: string, example: "PENDING_PAYMENT" }
        lock_strategy: { type: string, example: "REDIS_SETNX" }
        attempt_number: { type: integer, example: 3 }
        created_at: { type: string, format: date-time }

    SimulatedUser:
      type: object
      properties:
        id: { type: string, format: uuid }
        username: { type: string, example: "bot-user-99" }
        created_at: { type: string, format: date-time }

    ValidationError:
      type: object
      properties:
        success: { type: boolean, example: false }
        message: { type: string, example: "Validation failed" }
        errors:
          type: array
          items:
            type: object
            properties:
              field: { type: string, example: "status" }
              message: { type: string, example: "Invalid status value" }

    NotFoundError:
      type: object
      properties:
        success: { type: boolean, example: false }
        message: { type: string, example: "Resource not found" }

    ServerError:
      type: object
      properties:
        success: { type: boolean, example: false }
        message: { type: string, example: "Internal server error" }

    ConflictError:
      type: object
      properties:
        success: { type: boolean, example: false }
        code:
          type: string
          enum: [LOCK_FAILED, SOLD_OUT]
          example: "LOCK_FAILED"
        message:
          type: string
          example: "Failed to acquire lock. Please try again."

  responses:
    ValidationError:
      description: "Validation error on request payload or query parameters."
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ValidationError'

    NotFound:
      description: "Requested resource was not found."
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/NotFoundError'

    Conflict:
      description: "Conflict state reached (e.g. concurrency lock failed or ticket sold out)."
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ConflictError'

    ServerError:
      description: "Internal server error."
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ServerError'